<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trig Hexagon</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f5f4;display:flex;justify-content:center;padding:24px 16px}
  .cockpit{display:grid;grid-template-columns:1fr 220px;gap:20px;max-width:1000px;width:100%;align-items:start}
  canvas{width:100%;border-radius:10px;border:1px solid #ddd;background:#fff;display:block}
  .panel{display:flex;flex-direction:column;gap:8px}
  .ctrl-group{border:1px solid #e5e5e5;border-radius:10px;padding:10px 12px;background:#fff}
  .ctrl-label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
  .arrow{font-size:9px;color:#bbb}
  .collapsible{overflow:hidden;max-height:0;transition:max-height .25s ease}
  .collapsible.open{max-height:500px}
  .ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .ctrl-row:last-child{margin-bottom:0}
  .ctrl-row label{min-width:58px;color:#666;font-size:11px}
  .ctrl-row input[type=range]{flex:1;min-width:0;accent-color:#534AB7}
  .ctrl-row span{font-size:11px;min-width:28px;text-align:right;color:#666}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:12px;color:#333}
  .toggle-row:last-child{margin-bottom:0}
  .toggle{position:relative;width:30px;height:17px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .slider-t{position:absolute;inset:0;background:#ccc;border-radius:17px;cursor:pointer;transition:background .2s}
  .toggle input:checked+.slider-t{background:#534AB7}
  .slider-t:before{content:'';position:absolute;width:11px;height:11px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s}
  .toggle input:checked+.slider-t:before{transform:translateX(13px)}
  .color-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-top:4px}
  .color-item{display:flex;flex-direction:column;gap:3px}
  .color-item span{font-size:10px;color:#888}
  .color-item input[type=color]{width:100%;height:24px;border:1px solid #ddd;border-radius:4px;padding:2px;cursor:pointer;background:none}
  .dl-btn{width:100%;padding:9px;font-size:13px;font-weight:600;border-radius:8px;border:none;background:#534AB7;color:#fff;cursor:pointer;letter-spacing:.02em}
  .dl-btn:hover{background:#3C3489}
  .dl-btn:active{transform:scale(0.98)}
  .section-label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
</style>
</head>
<body>
<div class="cockpit">
  <canvas id="hex-canvas" width="1200" height="1200"></canvas>
  <div class="panel">

    <div class="ctrl-group">
      <div class="ctrl-label" onclick="tog('col-body','col-arr')">Colors <span id="col-arr" class="arrow">▼</span></div>
      <div class="collapsible" id="col-body">
        <div class="color-grid">
          <div class="color-item"><span>Background</span><input type="color" id="c-bg" value="#ffffff"></div>
          <div class="color-item"><span>Hexagon</span><input type="color" id="c-hex" value="#cc0000"></div>
          <div class="color-item"><span>Internals</span><input type="color" id="c-diag" value="#cc0000"></div>
          <div class="color-item"><span>Labels</span><input type="color" id="c-label" value="#8b0000"></div>
          <div class="color-item"><span>Center "1"</span><input type="color" id="c-center" value="#000000"></div>
          <div class="color-item"><span>Glow</span><input type="color" id="c-glow" value="#ffb3b3"></div>
          <div class="color-item"><span>Sphere fill</span><input type="color" id="c-sphere" value="#ffb3b3"></div>
          <div class="color-item"><span>Sphere edge</span><input type="color" id="c-sphere2" value="#000000"></div>
        </div>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="section-label">Stroke</div>
      <div class="ctrl-row"><label>Hex</label><input type="range" id="hex-stroke" min="1" max="16" step="0.5" value="11"><span id="hex-stroke-out">11</span></div>
      <div class="ctrl-row"><label>Internal</label><input type="range" id="diag-stroke" min="0.5" max="12" step="0.5" value="8"><span id="diag-stroke-out">8</span></div>
    </div>

    <div class="ctrl-group">
      <div class="section-label">Opacity</div>
      <div class="ctrl-row"><label>Hex fill</label><input type="range" id="hex-opacity" min="0" max="100" step="5" value="30"><span id="hex-opacity-out">30%</span></div>
      <div class="ctrl-row"><label>Tri fill</label><input type="range" id="diag-opacity" min="0" max="100" step="5" value="15"><span id="diag-opacity-out">15%</span></div>
    </div>

    <div class="ctrl-group">
      <div class="section-label">Typography</div>
      <div class="ctrl-row"><label>Labels</label><input type="range" id="font-size" min="10" max="100" step="1" value="72"><span id="font-size-out">72</span></div>
      <div class="ctrl-row"><label>Center</label><input type="range" id="center-size" min="6" max="80" step="1" value="36"><span id="center-size-out">36</span></div>
    </div>

    <div class="ctrl-group">
      <div class="section-label">Glow / Sphere</div>
      <div class="ctrl-row"><label>Radius</label><input type="range" id="glow-radius" min="10" max="160" step="2" value="44"><span id="glow-radius-out">44</span></div>
      <div class="ctrl-row"><label>Intensity</label><input type="range" id="glow-intensity" min="0" max="100" step="5" value="75"><span id="glow-intensity-out">75%</span></div>
    </div>

    <div class="ctrl-group">
      <div class="section-label">Show</div>
      <div class="toggle-row"><span>Labels</span><label class="toggle"><input type="checkbox" id="show-labels" checked><span class="slider-t"></span></label></div>
      <div class="toggle-row"><span>Diagonals</span><label class="toggle"><input type="checkbox" id="show-diag" checked><span class="slider-t"></span></label></div>
      <div class="toggle-row"><span>Center 1</span><label class="toggle"><input type="checkbox" id="show-center" checked><span class="slider-t"></span></label></div>
      <div class="toggle-row"><span>Triangles</span><label class="toggle"><input type="checkbox" id="show-tri" checked><span class="slider-t"></span></label></div>
      <div class="toggle-row"><span>Glow</span><label class="toggle"><input type="checkbox" id="show-glow" checked><span class="slider-t"></span></label></div>
      <div class="toggle-row"><span>Sphere mode</span><label class="toggle"><input type="checkbox" id="use-sphere" checked><span class="slider-t"></span></label></div>
    </div>

    <button class="dl-btn" onclick="downloadPNG()">Download PNG ↓</button>

  </div>
</div>

<script>
function tog(id,arrId){const b=document.getElementById(id);const open=b.classList.toggle('open');document.getElementById(arrId).textContent=open?'▲':'▼';}
const canvas=document.getElementById('hex-canvas');
const ctx=canvas.getContext('2d');
const W=1200,H=1200,cx=W/2,cy=H/2,hexR=W*0.32,labelR=hexR*1.18;
const flatLabels=['cot','cos','sin','tan','sec','csc'];
function flatVerts(r){const v=[];for(let i=0;i<6;i++){const a=Math.PI/3*i;v.push([cx+r*Math.cos(a),cy-r*Math.sin(a)]);}return v;}
function getVal(id){return document.getElementById(id).value;}
function getChecked(id){return document.getElementById(id).checked;}
function hexToRgba(hex,alpha){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${alpha})`;}
function drawGlow(gc,radius,intensity){const steps=24,r=parseInt(gc.slice(1,3),16),g=parseInt(gc.slice(3,5),16),b=parseInt(gc.slice(5,7),16);for(let i=steps;i>=0;i--){const f=i/steps;ctx.beginPath();ctx.arc(cx,cy,Math.max(1,Math.round(f*radius)),0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${(1-f)*(1-f)*intensity})`;ctx.fill();}}
function drawSphere(c1,c2,radius){ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fillStyle=c1;ctx.fill();ctx.strokeStyle=c2;ctx.lineWidth=3;ctx.stroke();}
function drawOne(color,size){
  const h=size*2.2,w=size*0.18,top=cy-h/2,bot=cy+h/2;
  ctx.strokeStyle=color;ctx.lineCap='round';
  ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(cx,top);ctx.lineTo(cx,bot);ctx.stroke();
  ctx.lineWidth=w*0.85;ctx.beginPath();ctx.moveTo(cx-size*0.55/2,top+size*0.55);ctx.lineTo(cx,top);ctx.stroke();
}
function draw(){
  const bg=getVal('c-bg'),hc=getVal('c-hex'),dc=getVal('c-diag'),lc=getVal('c-label'),cc=getVal('c-center'),gc=getVal('c-glow'),sc=getVal('c-sphere'),sc2=getVal('c-sphere2');
  const hs=parseFloat(getVal('hex-stroke')),ds=parseFloat(getVal('diag-stroke'));
  const ho=parseInt(getVal('hex-opacity'))/100,dop=parseInt(getVal('diag-opacity'))/100;
  const gr=parseInt(getVal('glow-radius')),gi=parseInt(getVal('glow-intensity'))/100;
  const sl=getChecked('show-labels'),sd=getChecked('show-diag'),sc_=getChecked('show-center'),st=getChecked('show-tri'),sg=getChecked('show-glow'),us=getChecked('use-sphere');
  const fs=parseInt(getVal('font-size')),cs=parseInt(getVal('center-size'));
  ctx.clearRect(0,0,W,H);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const fv=flatVerts(hexR);
  if(st){
    const triColors=['#e08080','#c06060','#e08080','#c06060','#e08080','#c06060'];
    for(let i=0;i<6;i++){const v1=fv[i],v2=fv[(i+1)%6];ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(v1[0],v1[1]);ctx.lineTo(v2[0],v2[1]);ctx.closePath();ctx.fillStyle=hexToRgba(triColors[i],dop*1.5);ctx.fill();}
  }
  if(sd){
    ctx.strokeStyle=dc;ctx.lineWidth=ds;ctx.lineCap='round';
    [[0,3],[1,4],[2,5]].forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(fv[a][0],fv[a][1]);ctx.lineTo(fv[b][0],fv[b][1]);ctx.stroke();});
    for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fv[i][0],fv[i][1]);ctx.stroke();}
  }
  ctx.beginPath();ctx.moveTo(fv[0][0],fv[0][1]);for(let i=1;i<6;i++)ctx.lineTo(fv[i][0],fv[i][1]);ctx.closePath();
  ctx.fillStyle=hexToRgba(hc,ho);ctx.fill();ctx.strokeStyle=hc;ctx.lineWidth=hs;ctx.lineJoin='round';ctx.stroke();
  if(sg){us?drawSphere(sc,sc2,gr):drawGlow(gc,gr,gi);}
  if(sc_)drawOne(cc,cs);
  if(sl){
    ctx.font=`italic ${fs}px Georgia,serif`;
    ctx.fillStyle=lc;ctx.textAlign='center';ctx.textBaseline='middle';
    flatLabels.forEach((lbl,i)=>{const a=Math.PI/3*i;ctx.fillText(lbl,cx+labelR*Math.cos(a),cy-labelR*Math.sin(a));});
  }
}
function bind(id,outId,suffix){const el=document.getElementById(id),out=outId?document.getElementById(outId):null;el.addEventListener('input',()=>{if(out)out.textContent=suffix?el.value+suffix:el.value;draw();});}
['c-bg','c-hex','c-diag','c-label','c-center','c-glow','c-sphere','c-sphere2'].forEach(id=>bind(id));
bind('hex-stroke','hex-stroke-out');bind('diag-stroke','diag-stroke-out');
bind('hex-opacity','hex-opacity-out','%');bind('diag-opacity','diag-opacity-out','%');
bind('font-size','font-size-out');bind('center-size','center-size-out');
bind('glow-radius','glow-radius-out');bind('glow-intensity','glow-intensity-out','%');
['show-labels','show-diag','show-center','show-tri','show-glow','use-sphere'].forEach(id=>{document.getElementById(id).addEventListener('change',draw);});
function downloadPNG(){
  canvas.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='trig_hexagon.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  },'image/png');
}
draw();
</script>
</body>
</html>
